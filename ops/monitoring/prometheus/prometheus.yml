global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Auth Microservice - Local Development
  # For local development, the service runs on host machine
  - job_name: "auth-microservice"
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: "auth"
          environment: "development"
    # Optional: Add bearer token for protected /metrics endpoint
    # authorization:
    #   type: Bearer
    #   credentials: "your-metrics-api-key"

  # Auth Microservice - Docker Compose (when running service in container)
  # Uncomment this if running the auth service in Docker
  # - job_name: "auth-microservice-docker"
  #   scrape_interval: 10s
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["auth-service:3000"]
  #       labels:
  #         service: "auth"
  #         environment: "docker"
