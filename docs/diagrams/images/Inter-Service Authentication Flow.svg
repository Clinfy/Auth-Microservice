style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 2.0; stroke-dasharray: 2.0,2.0;" x1="43.5" x2="177.5" y1="793.0123" y2="793.0123"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="58" x="55.5" y="787.2033">Response</text><path d="M423,806.0123 L423,869.0123 L638,869.0123 L638,816.0123 L628,806.0123 L423,806.0123 " fill="#FBFB77" filter="url(#f1ilritufo4jdr)" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M628,806.0123 L628,816.0123 L638,816.0123 L628,806.0123 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="194" x="429" y="824.9093">No IP check because the request</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="183" x="429" y="842.6153">originates from a microservice,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="137" x="429" y="860.3214">not the user's browser.</text><!--MD5=[db6550300ac4ba222a52c8d734fb0782]
@startuml Inter-Service Authentication Flow
skinparam backgroundColor white
skinparam sequenceArrowThickness 2

actor Browser as browser
participant "Other\nMicroservice" as other
participant "MicroserviceGuard" as guard
participant "ApiKeysService" as apiSvc
participant "JwtService" as jwt
database "Redis" as redis

browser -> other : Request\nCookie: auth_token
activate other

other -> other : Extract token from cookie

other -> guard : GET /users/me\nx-api-key: <service_key>\nAuthorization: Bearer <user_token>
activate guard

== Step 1: Validate API Key ==

guard -> apiSvc : findActiveByPlainKey(rawKey)
activate apiSvc
apiSvc - -> guard : ApiKeyEntity (with permissionCodes)
deactivate apiSvc

guard -> guard : Resolve @EndpointKey\nCheck API key permissions\nagainst dynamic rules

== Step 2: Validate User Token ==

guard -> jwt : getPayload(bearerToken, 'auth')
activate jwt
jwt - -> guard : {email, sid, ...}
deactivate jwt

guard -> redis : GET auth_session:{sid}
activate redis
redis - -> guard : session JSON
deactivate redis

guard -> guard : Verify:\n- session.active\n- email match\n**NO IP/subnet check**

guard - -> other : request.user = {id, email,\nperson_id, session_id}
deactivate guard

other - -> browser : Response
deactivate other

note right of guard
  No IP check because the request
  originates from a microservice,
  not the user's browser.
end note
@enduml

