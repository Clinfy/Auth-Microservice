26.716 L86,326.716 L86,335.716 L76,345.716 L13,345.716 L13,326.716 " fill="#EEEEEE" style="stroke: #000000; stroke-width: 1.0;"/><rect fill="none" height="100.8241" style="stroke: #000000; stroke-width: 2.0;" width="377.5" x="13" y="326.716"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="28" x="28" y="341.6131">loop</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="127" x="101" y="340.475">[for each enabled rule]</text><polygon fill="#A80036" points="347,383.8341,357,387.8341,347,391.8341,351,387.8341" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 2.0;" x1="111" x2="353" y1="387.8341" y2="387.8341"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="179" x="118" y="364.3191">SET epr:{endpoint_key_name}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="146" x="118" y="382.0251">(permission codes JSON)</text><polygon fill="#A80036" points="347,415.5401,357,419.5401,347,423.5401,351,419.5401" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 2.0;" x1="111" x2="353" y1="419.5401" y2="419.5401"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="224" x="118" y="413.7311">SADD epr_keys {endpoint_key_name}</text><path d="M116,439.5401 L116,519.5401 L265,519.5401 L265,449.5401 L255,439.5401 L116,439.5401 " fill="#FBFB77" filter="url(#f1ah963i6de4r1)" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M255,439.5401 L255,449.5401 L265,449.5401 L255,439.5401 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="120" x="122" y="458.4371">Handles edge cases:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="88" x="122" y="476.1431">- Redis restarts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="128" x="122" y="493.8492">- Missed invalidations</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="104" x="122" y="511.5552">- Manual DB edits</text><!--MD5=[a38755703fd68a1970f0777dc158cfc5]
@startuml EPR Cache Reconciliation
skinparam backgroundColor white
skinparam sequenceArrowThickness 2

participant "EprCacheReconciliation\n(Cron: every hour)" as cron
database "Redis" as redis
database "PostgreSQL" as db

cron -> redis : SMEMBERS epr_keys
activate redis
redis - -> cron : [key1, key2, ...]
deactivate redis

group Redis MULTI pipeline
  cron -> redis : DEL epr:key1, epr:key2, ...
  cron -> redis : DEL epr_keys
end

cron -> db : SELECT * FROM endpoint_permission_rules\nWHERE enabled = true
activate db
db - -> cron : enabled rules[]
deactivate db

loop for each enabled rule
  cron -> redis : SET epr:{endpoint_key_name}\n(permission codes JSON)
  cron -> redis : SADD epr_keys {endpoint_key_name}
end

note right of cron
  Handles edge cases:
  - Redis restarts
  - Missed invalidations
  - Manual DB edits
end note
@enduml

